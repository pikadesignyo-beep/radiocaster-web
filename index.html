<!DOCTYPE html>
<html>
<head>
    <title>RadioCaster Receiver</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0a0a;
            color: #ffffff; 
            font-family: sans-serif; 
        }
        
        #metadata-container { 
            position: absolute; 
            bottom: 15%; 
            left: 8%; 
            display: flex; 
            align-items: center; 
        }
        
        #artwork { 
            width: 250px; 
            height: 250px; 
            border-radius: 12px; 
            margin-right: 30px; 
            object-fit: cover; 
            display: none;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        
        .text-info { display: flex; flex-direction: column; }
        #title { font-size: 2.5em; font-weight: bold; margin-bottom: 8px;}
        #artist { font-size: 1.8em; color: #b3b3b3; }
    </style>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
    
    <audio id="audio-engine"></audio>

    <div id="metadata-container">
        <img id="artwork" src="" />
        <div class="text-info">
            <div id="title">RadioCaster V2</div>
            <div id="artist">Ready to Stream</div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.mediaElement = document.getElementById('audio-engine');
        context.start(options);

        let lastTrackIdentifier = "";

        async function fetchMetadata() {
            try {
                const response = await fetch("https://radio-api.mediaworks.nz/radio-api/v3/station/thesound/digital/web?unique=true");
                const json = await response.json();
                const nowPlaying = json.nowPlaying[0];
                
                const currentArtist = nowPlaying.artist;
                const currentTitle = nowPlaying.name;
                const defaultArtwork = nowPlaying.artwork;
                const currentTrackIdentifier = currentArtist + " - " + currentTitle;

                if (currentTrackIdentifier !== lastTrackIdentifier) {
                    lastTrackIdentifier = currentTrackIdentifier;
                    let finalArtworkUrl = defaultArtwork;

                    try {
                        const searchQuery = encodeURIComponent(currentArtist + " " + currentTitle);
                        const itunesResponse = await fetch("https://itunes.apple.com/search?term=" + searchQuery + "&entity=song&limit=1");
                        const itunesJson = await itunesResponse.json();
                        
                        if (itunesJson.resultCount > 0) {
                            const lowResUrl = itunesJson.results[0].artworkUrl100;
                            finalArtworkUrl = lowResUrl.replace("100x100bb", "1000x1000bb");
                        }
                    } catch (e) {
                        // Fallback to default MediaWorks artwork on iTunes failure
                    }

                    document.getElementById('title').textContent = currentTitle;
                    document.getElementById('artist').textContent = currentArtist;
                    
                    const img = document.getElementById('artwork');
                    if (finalArtworkUrl) {
                        img.src = finalArtworkUrl;
                        img.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error("API fetch failure");
            }
        }

        setInterval(fetchMetadata, 5000);
        fetchMetadata();
    </script>
</body>
</html>
