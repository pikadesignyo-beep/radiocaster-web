<!DOCTYPE html>
<html>
<head>
    <title>Garage FM</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0a0a;
            color: #ffffff; 
            font-family: sans-serif; 
        }

        #bg-blur {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120vw;
            height: 120vh;
            object-fit: cover;
            filter: blur(40px) brightness(0.3);
            z-index: -2;
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }

        #station-logo {
            position: absolute;
            top: 40px;
            right: 40px;
            height: 80px;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }
        
        #metadata-container { 
            position: absolute; 
            bottom: 15%; 
            left: 8%; 
            display: flex; 
            align-items: center; 
            z-index: 5;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        
        #artwork { 
            width: 250px; 
            height: 250px; 
            border-radius: 12px; 
            margin-right: 30px; 
            object-fit: cover; 
            display: none;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
        }
        
        .text-info { 
            display: flex; 
            flex-direction: column; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.9);
        }
        
        #title { font-size: 2.5em; font-weight: bold; margin-bottom: 8px;}
        #artist { font-size: 1.8em; color: #e0e0e0; }
    </style>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>

    <img id="bg-blur" src="" />
    <img id="station-logo" src="garage-fm-logo.png" />
    <audio id="audio-engine"></audio>

    <div id="metadata-container">
        <img id="artwork" src="" />
        <div class="text-info">
            <div id="title">Garage FM</div>
            <div id="artist">Ready to Stream</div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.mediaElement = document.getElementById('audio-engine');

        // Track the current state to prevent redundant UI updates
        let lastTrackKey = "";

        // Helper to handle smooth transitions
        function updateUI(data) {
            const container = document.getElementById('metadata-container');
            const bgBlur = document.getElementById('bg-blur');
            const logo = document.getElementById('station-logo');
            
            // 1. Fade out
            container.style.opacity = '0';
            bgBlur.style.opacity = '0';
            logo.style.opacity = '0';

            // 2. Wait for fade out, then swap data
            setTimeout(() => {
                document.getElementById('title').textContent = data.title;
                document.getElementById('artist').textContent = data.artist;
                
                const img = document.getElementById('artwork');
                if (data.artworkUrl) {
                    img.src = data.artworkUrl;
                    img.style.display = 'block';
                    bgBlur.src = data.artworkUrl;
                } else {
                    img.style.display = 'none';
                    bgBlur.src = ''; 
                }

                if (data.stationId === 'hauraki') logo.src = 'hauraki.png';
                else if (data.stationId === 'brianfm') logo.src = 'brianfm.png';
                else logo.src = 'thesound.png';

                // 3. Fade back in
                container.style.opacity = '1';
                bgBlur.style.opacity = '1';
                logo.style.opacity = '0.8';
            }, 500);
        }

        context.addCustomMessageListener('urn:x-cast:nz.mediaworks.radio', (event) => {
            let data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            
            // Generate a unique key for the current track
            const currentTrackKey = data.artist + data.title + data.stationId;

            // Only trigger updateUI if the track has actually changed
            if (currentTrackKey !== lastTrackKey) {
                lastTrackKey = currentTrackKey;
                updateUI(data);
            }
        });

        context.start(options);
    </script>
</body>
</html>
