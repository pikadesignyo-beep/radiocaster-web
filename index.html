<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #container { text-align: center; width: 80%; }
        #artwork { width: 400px; height: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; }
        #artist { font-size: 2.5em; margin: 20px 0 10px 0; }
        #title { font-size: 1.8em; color: #aaa; }
    </style>
</head>
<body>

    <div id="container">
        <img id="artwork" src="" alt="Album Art">
        <h1 id="artist">Waiting for metadata...</h1>
        <p id="title"></p>
    </div>

    <!-- Cast Receiver SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // Listen for your custom metadata messages
        context.addCustomMessageListener('urn:x-cast:nz.mediaworks.radio', (event) => {
            const data = JSON.parse(event.data);
            
            // Update UI
            document.getElementById('artist').innerText = data.artist;
            document.getElementById('title').innerText = data.title;
            document.getElementById('artwork').src = data.artworkUrl;
            
            console.log("Metadata updated for: " + data.stationId);
        });

        context.start();
    </script>
</body>
</html>
