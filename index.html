<!DOCTYPE html>
<html>
<head>
    <title>Garage FM</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0a0a;
            color: #ffffff; 
            font-family: sans-serif; 
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .bg-layer {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110vw;
            height: 110vh;
            object-fit: cover;
            filter: blur(6px) brightness(0.5);
            z-index: -2;
            opacity: 0;
            transition: opacity 3s ease-in-out; 
            animation: kenburns 25s linear infinite alternate; 
        }

        .bg-active {
            opacity: 1;
            z-index: -1;
        }

        #station-logo {
            position: absolute;
            top: 40px;
            right: 40px;
            height: 80px;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }
        
        #metadata-container { 
            position: absolute; 
            bottom: 15%; 
            left: 8%; 
            display: flex; 
            align-items: center; 
            z-index: 5;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        
        #artwork { 
            width: 250px; 
            height: 250px; 
            border-radius: 12px; 
            margin-right: 30px; 
            object-fit: cover; 
            display: none;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
        }
        
        .text-info { 
            display: flex; 
            flex-direction: column; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.9);
        }
        
        #title { font-size: 2.5em; font-weight: bold; margin-bottom: 8px;}
        #artist { font-size: 1.8em; color: #e0e0e0; }
    </style>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>

    <img id="bg-1" class="bg-layer bg-active" src="" />
    <img id="bg-2" class="bg-layer" src="" />
    
    <img id="station-logo" src="garage-fm-logo.png" />
    <audio id="audio-engine"></audio>

    <div id="metadata-container">
        <img id="artwork" src="" />
        <div class="text-info">
            <div id="title">Garage FM</div>
            <div id="artist">Ready to Stream</div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.mediaElement = document.getElementById('audio-engine');

        let lastTrackKey = "";
        let slideshowInterval;

        function startSlideshow(artistImagesArray, albumImg) {
            clearInterval(slideshowInterval); 
            
            let images = [];
            if (artistImagesArray && Array.isArray(artistImagesArray)) {
                images = images.concat(artistImagesArray);
            }
            
            if (images.length === 0 && albumImg) {
                images.push(albumImg);
            }
            
            if (images.length === 0) return;

            let activeBg = document.getElementById('bg-1');
            let hiddenBg = document.getElementById('bg-2');

            activeBg.src = images[0];
            activeBg.classList.add('bg-active');
            hiddenBg.classList.remove('bg-active');

            if (images.length > 1) {
                let currentIndex = 0;
                
                slideshowInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % images.length;
                    
                    hiddenBg.src = images[currentIndex];
                    
                    setTimeout(() => {
                        hiddenBg.classList.add('bg-active');
                        activeBg.classList.remove('bg-active');
                        
                        let temp = activeBg;
                        activeBg = hiddenBg;
                        hiddenBg = temp;
                    }, 500); 

                }, 15000); 
            }
        }

        function updateUI(data) {
            const container = document.getElementById('metadata-container');
            const logo = document.getElementById('station-logo');
            
            container.style.opacity = '0';
            logo.style.opacity = '0';

            setTimeout(() => {
                document.getElementById('title').textContent = data.title;
                document.getElementById('artist').textContent = data.artist;
                
                const img = document.getElementById('artwork');
                if (data.artworkUrl) {
                    img.src = data.artworkUrl;
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }

                if (data.stationId === 'hauraki') logo.src = 'hauraki.png';
                else if (data.stationId === 'brianfm') logo.src = 'brianfm.png';
                else logo.src = 'thesound.png';

                startSlideshow(data.artistImages, data.artworkUrl);

                container.style.opacity = '1';
                logo.style.opacity = '0.8';
            }, 500);
        }

        context.addCustomMessageListener('urn:x-cast:nz.mediaworks.radio', (event) => {
            let data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            
            const currentTrackKey = data.artist + data.title + data.stationId;

            if (currentTrackKey !== lastTrackKey) {
                lastTrackKey = currentTrackKey;
                updateUI(data);
            }
        });

        context.start(options);
    </script>
</body>
</html>
