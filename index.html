<!DOCTYPE html>
<html>
<head>
    <title>Garage FM</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0a0a;
            color: #ffffff; 
            font-family: sans-serif; 
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .bg-layer {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110vw;
            height: 110vh;
            object-fit: cover;
            filter: blur(6px) brightness(0.5);
            z-index: -2;
            opacity: 0;
            transition: opacity 3s ease-in-out; 
            animation: kenburns 25s linear infinite alternate; 
        }

        .bg-active {
            opacity: 1;
            z-index: -1;
        }

        #station-logo {
            position: absolute;
            top: 40px;
            right: 40px;
            height: 80px;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }
        
        #metadata-container { 
            position: absolute; 
            bottom: 15%; 
            left: 8%; 
            display: flex; 
            align-items: center; 
            z-index: 5;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        
        #artwork { 
            width: 250px; 
            height: 250px; 
            border-radius: 12px; 
            margin-right: 30px; 
            object-fit: cover; 
            display: none;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
        }
        
        .text-info { 
            display: flex; 
            flex-direction: column; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.9);
        }
        
        #title { font-size: 2.5em; font-weight: bold; margin-bottom: 8px;}
        #artist { font-size: 1.8em; color: #e0e0e0; }
    </style>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>

    <img id="bg-1" class="bg-layer bg-active" src="" />
    <img id="bg-2" class="bg-layer" src="" />
    
    <img id="station-logo" src="garage-fm-logo.png" />
    <audio id="audio-engine"></audio>

    <div id="metadata-container">
        <img id="artwork" src="" />
        <div class="text-info">
            <div id="title">Garage FM</div>
            <div id="artist">Ready to Stream</div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.mediaElement = document.getElementById('audio-engine');

        let currentStationId = "thesound";
        let lastPolledTrackKey = "";
        let slideshowInterval;

        const compilationJunk = ["greatest", "best of", "hits", "collection", "anthology", "essential", "ultimate", "gold", "platinum", "classics", "singles", "volume", "box set", "archive"];
        const liveJunk = ["live", "broadcast", "radio", "session", "recorded", "at the", "unplugged", "concert", "tour", "bbc", "sessions", "bootleg", "in session"];
        const remasterJunk = ["deluxe", "expanded", "remaster", "remastered", "anniversary", "bonus", "special", "edition", "reissue", "super", "definitive", "extended", "original recording", "re:call"];
        const hardJunk = ["karaoke", "instrumental", "tribute", "cover", "workout", "lullaby", "8-bit", "parody", "version", "remix", "mix", "dj", "soundtrack", "ost", "score"];
        const radioStationFluff = ["classic rock", "driving music", "hit mix", "80s", "90s", "current", "now playing", "station", "radio", "broadcast", "playlist"];

        function containsAnyWord(str, words) {
            str = str.toLowerCase();
            return words.some(word => new RegExp('\\b' + word + '\\b').test(str));
        }

        function startSlideshow(artistImagesArray, albumImg) {
            clearInterval(slideshowInterval); 
            
            let images = [];
            if (artistImagesArray && Array.isArray(artistImagesArray)) {
                images = images.concat(artistImagesArray);
            }
            
            if (images.length === 0 && albumImg && albumImg.trim() !== "") {
                images.push(albumImg);
            }
            
            let activeBg = document.getElementById('bg-1');
            let hiddenBg = document.getElementById('bg-2');

            if (images.length === 0) {
                activeBg.classList.remove('bg-active');
                hiddenBg.classList.remove('bg-active');
                return;
            }

            activeBg.src = images[0];
            activeBg.classList.add('bg-active');
            hiddenBg.classList.remove('bg-active');

            if (images.length > 1) {
                let currentIndex = 0;
                
                slideshowInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % images.length;
                    hiddenBg.src = images[currentIndex];
                    
                    setTimeout(() => {
                        hiddenBg.classList.add('bg-active');
                        activeBg.classList.remove('bg-active');
                        
                        let temp = activeBg;
                        activeBg = hiddenBg;
                        hiddenBg = temp;
                    }, 500); 

                }, 30000); 
            }
        }

        function updateUI(data) {
            const container = document.getElementById('metadata-container');
            const logo = document.getElementById('station-logo');
            
            container.style.opacity = '0';
            logo.style.opacity = '0';

            setTimeout(() => {
                document.getElementById('title').textContent = data.title;
                document.getElementById('artist').textContent = data.artist;
                
                const img = document.getElementById('artwork');
                if (data.artworkUrl && data.artworkUrl.trim() !== "") {
                    img.src = data.artworkUrl;
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }

                if (currentStationId === 'hauraki') logo.src = 'hauraki.png';
                else if (currentStationId === 'brianfm') logo.src = 'brianfm.png';
                else logo.src = 'thesound.png';

                startSlideshow(data.artistImages, data.artworkUrl);

                container.style.opacity = '1';
                logo.style.opacity = '0.8';
            }, 500);
        }

        async function fetchArtwork(artist, title) {
            let cleanArtist = artist.replace(/\s*\([^)]*\)/g, '').trim();
            let cleanTrack = title.replace(/\s*\([^)]*\)/g, '').trim();
            radioStationFluff.forEach(fluff => {
                cleanTrack = cleanTrack.replace(new RegExp(fluff, 'gi'), '').trim();
            });

            let foundArtwork = "";
            let fanartArray = [];

            try {
                let itQuery = cleanArtist + " " + cleanTrack;
                let itUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(itQuery)}&media=music&entity=song&limit=5`;
                let res = await fetch(itUrl);
                if (res.ok) {
                    let data = await res.json();
                    if (data.results && data.results.length > 0) {
                        let cleanArtistNorm = cleanArtist.toLowerCase().replace(/&/g, "and");
                        let cleanTrackNorm = cleanTrack.toLowerCase();
                        let bestCandidateUrl = "";
                        let bestScore = 0;

                        for (let i = 0; i < data.results.length; i++) {
                            let resultObj = data.results[i];
                            let artistNameFromApi = (resultObj.artistName || "").toLowerCase().replace(/&/g, "and");
                            let trackTitleFromApi = (resultObj.trackName || "").toLowerCase();
                            let albumNameFromApi = (resultObj.collectionName || "").toLowerCase();

                            let currentScore = 0;

                            if (artistNameFromApi.includes(cleanArtistNorm) || cleanArtistNorm.includes(artistNameFromApi)) {
                                currentScore += 50;
                            }

                            if (trackTitleFromApi === cleanTrackNorm) {
                                currentScore += 50;
                            } else if (trackTitleFromApi.includes(cleanTrackNorm) || cleanTrackNorm.includes(trackTitleFromApi)) {
                                currentScore += 30;
                            }

                            if (containsAnyWord(albumNameFromApi, hardJunk) || containsAnyWord(trackTitleFromApi, hardJunk) || containsAnyWord(artistNameFromApi, hardJunk)) {
                                currentScore -= 100;
                            } else {
                                if (containsAnyWord(albumNameFromApi, compilationJunk) || containsAnyWord(trackTitleFromApi, compilationJunk)) currentScore -= 25;
                                if (containsAnyWord(albumNameFromApi, liveJunk) || containsAnyWord(trackTitleFromApi, liveJunk)) currentScore -= 20;
                                if (containsAnyWord(albumNameFromApi, remasterJunk) || containsAnyWord(trackTitleFromApi, remasterJunk)) currentScore -= 5;
                            }

                            if (currentScore > bestScore) {
                                bestScore = currentScore;
                                bestCandidateUrl = (resultObj.artworkUrl100 || "").replace("100x100bb.jpg", "600x600bb.jpg");
                            }
                        }

                        if (bestScore >= 70) {
                            foundArtwork = bestCandidateUrl;
                        }
                    }
                }
            } catch (e) { console.error("iTunes Error: ", e); }

            try {
                let mbQuery = `artist:"${cleanArtist}"`;
                let mbUrl = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(mbQuery)}&fmt=json`;
                
                let mbRes = await fetch(mbUrl);
                
                if (mbRes.ok) {
                    let mbData = await mbRes.json();
                    let mbid = (mbData.artists && mbData.artists.length > 0) ? mbData.artists[0].id : "";

                    // Modify the Fanart fetch block
if (mbid) {
    let fanartKey = "5901f1655cfb16ad1eb7af6357ca9cc4";
    // Append timestamp to bust the cache and force a fresh CORS evaluation
    let timestamp = new Date().getTime();
    let fanartRes = await fetch(`https://webservice.fanart.tv/v3/music/${mbid}?api_key=${fanartKey}&_=${timestamp}`);
    
    if (fanartRes.ok) {
        let fanartData = await fanartRes.json();
        if (fanartData.artistbackground && fanartData.artistbackground.length > 0) {
            for(let i=0; i < Math.min(fanartData.artistbackground.length, 8); i++) {
                fanartArray.push(fanartData.artistbackground[i].url);
            }
        }
    }
}}
                }
            } catch (e) { console.error("Fanart Error: ", e); }

            updateUI({
                artist: artist,
                title: title,
                artworkUrl: foundArtwork,
                artistImages: fanartArray
            });
        }

        async function pollMetadata() {
            if (!currentStationId) return;

            let apiUrl = "";
            if (currentStationId === 'brianfm') apiUrl = "https://yp.cdnstream1.com/metadata/7100_128k/current.json";
            else if (currentStationId === 'hauraki') apiUrl = "https://nz.api.iheart.com/api/v3/live-meta/stream/6191/currentTrackMeta";
            else apiUrl = `https://radio-api.mediaworks.nz/radio-api/v3/station/${currentStationId}/digital/web?unique=true`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) return;
                const text = await response.text();
                if (!text.trim()) return;

                let newArtist = "The Sound";
                let newTitle = "Live Broadcast";

                if (currentStationId === 'brianfm') {
                    const json = JSON.parse(text)[0];
                    newArtist = json.TPE1 || "Brian FM";
                    newTitle = json.TIT2 || "Live Stream";
                } else if (currentStationId === 'hauraki') {
                    const json = JSON.parse(text);
                    newArtist = json.artist || "Radio Hauraki";
                    newTitle = json.title || "Live Broadcast";
                } else {
                    const json = JSON.parse(text);
                    const nowPlaying = json.nowPlaying && json.nowPlaying[0];
                    newArtist = nowPlaying ? nowPlaying.artist : "The Sound";
                    newTitle = nowPlaying ? nowPlaying.name : "Live Broadcast";
                }

                const trackKey = newArtist + " - " + newTitle;
                
                if (trackKey !== lastPolledTrackKey) {
                    lastPolledTrackKey = trackKey;
                    
                    document.getElementById('artwork').style.display = 'none';
                    document.getElementById('bg-1').classList.remove('bg-active');
                    document.getElementById('bg-2').classList.remove('bg-active');
                    clearInterval(slideshowInterval);

                    fetchArtwork(newArtist, newTitle);
                }
            } catch (e) {
                console.error("Polling Error: ", e);
            }
        }

        context.addCustomMessageListener('urn:x-cast:nz.mediaworks.radio', (event) => {
            let data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            if (data.stationId && data.stationId !== currentStationId) {
                currentStationId = data.stationId;
                lastPolledTrackKey = ""; 
                pollMetadata(); 
            }
        });

        setInterval(pollMetadata, 5000);

        context.start(options);
    </script>
</body>
</html>
