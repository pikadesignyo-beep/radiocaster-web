<!DOCTYPE html>
<html>
<head>
    <title>RadioCaster Receiver</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0a0a; /* Dark background */
            color: #ffffff; 
            font-family: sans-serif; 
        }
        
        /* This hides the default Google Cast progress bar and text */
        cast-media-player { display: none; } 

        #metadata-container { 
            position: absolute; 
            bottom: 15%; 
            left: 8%; 
            display: flex; 
            align-items: center; 
        }
        
        #artwork { 
            width: 250px; 
            height: 250px; 
            border-radius: 12px; 
            margin-right: 30px; 
            object-fit: cover; 
            display: none;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        
        .text-info { display: flex; flex-direction: column; }
        #title { font-size: 2.5em; font-weight: bold; margin-bottom: 8px;}
        #artist { font-size: 1.8em; color: #b3b3b3; }
    </style>
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
    
    <cast-media-player></cast-media-player>

    <div id="metadata-container">
        <img id="artwork" src="" />
        <div class="text-info">
            <div id="title">RadioCaster V2</div>
            <div id="artist">Ready to Stream</div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // 1. Listen for the initial load from the phone
        playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, (event) => {
            if (event.mediaStatus && event.mediaStatus.media && event.mediaStatus.media.metadata) {
                const metadata = event.mediaStatus.media.metadata;
                updateUI(metadata.title, metadata.artist, metadata.images ? metadata.images[0].url : '');
            }
        });

        // 2. The Custom Message Channel (This is how we bypass the SDK limits)
        const CUSTOM_CHANNEL = 'urn:x-cast:nz.mediaworks.radio';
        
        context.addCustomMessageListener(CUSTOM_CHANNEL, (customEvent) => {
            try {
                // Parse the JSON string sent from Android
                const liveData = JSON.parse(customEvent.data);
                updateUI(liveData.title, liveData.artist, liveData.artworkUrl);
            } catch (e) {
                console.error("Data parse error", e);
            }
        });

        // Helper function to update the screen
        function updateUI(title, artist, artworkUrl) {
            if (title) document.getElementById('title').textContent = title;
            if (artist) document.getElementById('artist').textContent = artist;
            
            const img = document.getElementById('artwork');
            if (artworkUrl) {
                img.src = artworkUrl;
                img.style.display = 'block';
            }
        }

        // Start the receiver system
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true; // Prevents the TV from sleeping during live radio
        context.start(options);
    </script>
</body>
</html>
